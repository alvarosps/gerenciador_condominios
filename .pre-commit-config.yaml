# Pre-commit hooks for Condominios Manager

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: '\.sql$'
      - id: end-of-file-fixer
        exclude: '\.sql$'
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      # NOTE: no mixed-line-ending hook. The repo normalizes line endings via
      # .gitattributes (`* text=auto` → LF in the repository), and forcing
      # `--fix=lf` in the working tree fights git's core.autocrlf=true on
      # Windows, breaking lint-staged's stash/restore.

  # Ruff — replaces black, isort, flake8, pylint
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # NOTE: type-checking (mypy + pyright) is NOT a pre-commit hook. It needs the
  # full runtime deps (celery, etc.) which an isolated hook env lacks, and it is
  # too slow for every commit. Run it via the canonical gate / CI instead:
  #   mypy core/ condominios_manager/ finances/ && pyright

  # Frontend gate (ESLint --fix + Prettier) via lint-staged — single hook
  # manager: pre-commit (root) is authoritative; husky was removed.
  - repo: local
    hooks:
      - id: frontend-lint-staged
        name: frontend lint-staged
        entry: bash -c 'cd frontend && npx lint-staged'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: '3.0.0'
