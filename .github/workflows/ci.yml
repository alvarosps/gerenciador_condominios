name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: condominio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Create .env file
      run: |
        echo "SECRET_KEY=ci-test-secret-key-not-for-production-min-32-bytes" > .env
        echo "DEBUG=True" >> .env
        # No Redis service in CI — empty REDIS_URL makes settings use the in-memory LocMemCache
        # (the same backend the test suite forces via conftest), so cache invalidation never tries
        # to reach 127.0.0.1:6379.
        echo "REDIS_URL=" >> .env
        echo "DB_NAME=condominio_test" >> .env
        echo "DB_USER=postgres" >> .env
        echo "DB_PASSWORD=postgres" >> .env
        echo "DB_HOST=localhost" >> .env
        echo "DB_PORT=5432" >> .env

    - name: Run migrations
      run: |
        python manage.py migrate --noinput
      env:
        DJANGO_SETTINGS_MODULE: condominios_manager.settings

    - name: Run tests with coverage
      run: |
        pytest --cov=core --cov-report=xml --cov-report=term-missing --cov-fail-under=90 -v
      env:
        DJANGO_SETTINGS_MODULE: condominios_manager.settings

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Create .env file
      run: |
        # mypy's django-stubs plugin initializes Django, which imports settings.py and reads
        # SECRET_KEY (no default). Provide it (plus an empty REDIS_URL) so the plugin can load.
        echo "SECRET_KEY=ci-test-secret-key-not-for-production-min-32-bytes" > .env
        echo "DEBUG=True" >> .env
        echo "REDIS_URL=" >> .env

    - name: Lint and format with Ruff
      run: |
        ruff check .
        ruff format --check .

    - name: Type check with mypy
      run: |
        mypy core/ condominios_manager/ finances/

    # pyright is installed from requirements-dev.txt (pinned exact), not an ad-hoc unpinned install.
    - name: Type check with pyright
      run: pyright

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run TypeScript type check
      run: npm run type-check

    - name: Run ESLint
      run: npm run lint

    - name: Run unit tests
      run: npm run test:unit -- --reporter=verbose

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8008/api

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
        pip install -r requirements.txt

    - name: Run Bandit security linter
      run: |
        bandit -r core/ condominios_manager/ finances/ -c pyproject.toml -ll -f json -o bandit-report.json

    - name: Check for known security vulnerabilities
      # safety scan needs a SAFETY_API_KEY secret to be a hard gate; kept informational
      # (continue-on-error) until that secret is provisioned. Bandit above is the hard gate.
      run: |
        safety scan --ci
      continue-on-error: true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [test, code-quality, security, frontend-test, frontend-build]
    if: always()

    steps:
    - name: Check build status
      run: |
        echo "Backend test job status: ${{ needs.test.result }}"
        echo "Code quality job status: ${{ needs.code-quality.result }}"
        echo "Security job status: ${{ needs.security.result }}"
        echo "Frontend test job status: ${{ needs.frontend-test.result }}"
        echo "Frontend build job status: ${{ needs.frontend-build.result }}"

        if [ "${{ needs.test.result }}" != "success" ]; then
          echo "::error::Backend tests failed!"
          exit 1
        fi

        if [ "${{ needs.code-quality.result }}" != "success" ]; then
          echo "::error::Code quality checks failed!"
          exit 1
        fi

        if [ "${{ needs.frontend-build.result }}" != "success" ]; then
          echo "::error::Frontend build failed!"
          exit 1
        fi

        if [ "${{ needs.frontend-test.result }}" != "success" ]; then
          echo "::error::Frontend tests failed!"
          exit 1
        fi

        if [ "${{ needs.security.result }}" != "success" ]; then
          echo "::error::Security audit failed!"
          exit 1
        fi

        echo "Build completed successfully!"
